<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Event</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <span class="brand">EventMS</span>
  <a href="index.html">Events</a>
  <a href="create-event.html">Create Event</a>
  <a href="register.html">Register</a>
  <a href="participants.html">Participants</a>
</nav>

<div class="container">
  <h1>Create New Event</h1>
  <div id="message"></div>

  <form id="create-event-form">
    <label>Event Title</label>
    <input type="text" id="title" placeholder="e.g. Tech Conference 2026" required>

    <label>Date</label>
    <input type="date" id="date" required>

    <label>Base Price ($)</label>
    <input type="number" id="basePrice" placeholder="e.g. 100" min="0" step="0.01" required>

    <label>Capacity</label>
    <input type="number" id="capacity" placeholder="e.g. 50" min="1" required>

    <button type="submit" class="btn btn-primary">Create Event</button>
  </form>
</div>

<script>
  const API = 'http://localhost:8080/api';

  function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.innerHTML = `<div class="message ${type}">${text}</div>`;
    setTimeout(() => msg.innerHTML = '', 4000);
  }

  document.getElementById('create-event-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const event = {
      title: document.getElementById('title').value,
      date: document.getElementById('date').value,
      basePrice: parseFloat(document.getElementById('basePrice').value),
      capacity: parseInt(document.getElementById('capacity').value)
    };

    try {
      const res = await fetch(`${API}/events`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(event)
      });

      if (res.ok) {
        showMessage('Event created successfully!', 'success');
        document.getElementById('create-event-form').reset();
      } else {
        showMessage('Failed to create event. Please check your inputs.', 'error');
      }
    } catch (err) {
      showMessage('Error connecting to backend.', 'error');
    }
  });
</script>

</body>
</html>
