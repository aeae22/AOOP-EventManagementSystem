<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
    <span class="brand">EventMS</span>
    <a href="index.html">Events</a>
    <a href="create-event.html">Create Event</a>
    <a href="register.html">Register</a>
    <a href="participants.html">Participants</a>
</nav>

<div class="container">
    <h1>Available Events</h1>
    <div id="message"></div>
    <div id="events-list">
        <p class="empty">Loading events...</p>
    </div>
</div>

<script>
    const API = 'http://localhost:8080/api';

    function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.innerHTML = `<div class="message ${type}">${text}</div>`;
        setTimeout(() => msg.innerHTML = '', 4000);
    }

    async function loadEvents() {
        try {
            const res = await fetch(`${API}/events`);
            const events = await res.json();
            const container = document.getElementById('events-list');

            if (events.length === 0) {
                container.innerHTML = '<p class="empty">No events found. Create one!</p>';
                return;
            }

            container.innerHTML = events.map(event => `
                <div class="card">
                    <div class="card-info">
                        <h3>${event.title}</h3>
                        <p>Date: ${event.date}</p>
                        <p>Base Price: $${event.basePrice}</p>
                        <p>Capacity: ${event.capacity}</p>
                        <p>Ticket Types: ${event.ticketTypes.map(t => t.name).join(', ')}</p>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <a href="participants.html?eventId=${event.id}" class="btn btn-secondary">View Participants</a>
                        <button class="btn btn-danger" onclick="deleteEvent(${event.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            document.getElementById('events-list').innerHTML = '<p class="empty">Error loading events. Is the backend running?</p>';
        }
    }

    async function deleteEvent(id) {
        if (!confirm('Are you sure you want to delete this event?')) return;
        try {
            const res = await fetch(`${API}/events/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showMessage('Event deleted successfully!', 'success');
                loadEvents();
            } else {
                showMessage('Failed to delete event.', 'error');
            }
        } catch (err) {
            showMessage('Error connecting to backend.', 'error');
        }
    }

    loadEvents();
</script>

</body>
</html>
